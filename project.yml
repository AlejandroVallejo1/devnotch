name: DevNotch
options:
  bundleIdPrefix: com.alejandrovallejo
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  DevNotch:
    type: application
    platform: macOS
    sources:
      - path: ClaudeNotch
        excludes:
          - "Info.plist"
          - "ClaudeNotch.entitlements"
    resources:
      - ClaudeNotch/Assets.xcassets
    info:
      path: ClaudeNotch/Info.plist
      properties:
        LSUIElement: true
        NSHumanReadableCopyright: "© 2026 Alejandro Vallejo"
        CFBundleDisplayName: DevNotch
        NSUserNotificationAlertStyle: alert
    entitlements:
      path: ClaudeNotch/ClaudeNotch.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.automation.apple-events: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alejandrovallejo.DevNotch
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_ENTITLEMENTS: ClaudeNotch/ClaudeNotch.entitlements
    dependencies:
      - sdk: WebKit.framework
      - sdk: UserNotifications.framework
