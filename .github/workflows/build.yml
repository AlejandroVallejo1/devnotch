name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project ClaudeNotch.xcodeproj \
            -scheme ClaudeNotch \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Locate .app
        id: locate
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -type d -name "ClaudeNotch.app" -path "*Release*" | head -n 1)
          echo "Found: $APP_PATH"
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Package DMG
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          brew install create-dmg
          mkdir -p dist
          create-dmg \
            --volname "ClaudeNotch" \
            --window-size 520 360 \
            --icon-size 96 \
            --icon "ClaudeNotch.app" 160 180 \
            --app-drop-link 360 180 \
            --hide-extension "ClaudeNotch.app" \
            "dist/ClaudeNotch-${{ github.ref_name }}.dmg" \
            "${{ steps.locate.outputs.app_path }}"

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeNotch.app
          path: ${{ steps.locate.outputs.app_path }}
          if-no-files-found: error

      - name: Upload DMG to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
          draft: true
